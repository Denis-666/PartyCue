<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PartyCue</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup">
      <header class="hero">
        <div class="brand-lockup">
          <div class="brand-mark" aria-hidden="true">
            <svg class="brand-glyph" viewBox="0 0 128 128" focusable="false">
              <circle class="glyph-fill" cx="64" cy="64" r="45"/>
              <circle class="glyph-cut" cx="48" cy="55" r="6"/>
              <circle class="glyph-cut" cx="80" cy="55" r="6"/>
              <path class="glyph-smile" d="M42 74c9 15 35 15 44 0"/>
            </svg>
          </div>
          <span class="brand-divider" aria-hidden="true"></span>
          <div class="brand-copy">
            <div class="eyebrow">PartyCue</div>
            <h1>Now<br>Playing</h1>
          </div>
        </div>
        <p id="page-status">正在连接当前标签页...</p>
      </header>

      <section class="result" id="result">
        <div class="empty"><span class="empty-orbit" aria-hidden="true"></span>暂无识别结果</div>
      </section>

      <section class="raw">
        <div class="label"><span aria-hidden="true"></span>OCR 原文</div>
        <pre id="raw-text">等待截图。</pre>
      </section>

      <div class="actions">
        <button id="scan" type="button">识别一次</button>
        <button id="listen" type="button" class="secondary">开始监听</button>
      </div>

      <footer id="hint">只支持指定的 YouTube 直播页面。</footer>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
