<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>OCR Smoke</title>
    <script src="../../vendor/tesseract.min.js"></script>
  </head>
  <body>
    <pre id="out">running</pre>
    <canvas id="canvas"></canvas>
    <script>
      const out = document.getElementById("out");
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d", { willReadFrequently: true });
      const image = new Image();
      image.onload = async () => {
        const worker = await Tesseract.createWorker("eng", 1, {
          corePath: "../../vendor",
          langPath: "../../vendor/lang",
          workerPath: "../../vendor/worker.min.js"
        });
        await worker.setParameters({
          preserve_interword_spaces: "1",
          tessedit_pageseg_mode: "6",
          user_defined_dpi: "180"
        });
        drawVariant("bright");
        const result = await worker.recognize(canvas);
        out.textContent = "RESULT\\n" + result.data.text.trim();
        await worker.terminate();
      };
      image.src = "fixtures/screenshot-crop.png";

      function drawVariant(variant) {
        const padding = 18;
        const scale = 4;
        canvas.width = Math.round(image.naturalWidth * scale + padding * 2);
        canvas.height = Math.round(image.naturalHeight * scale + padding * 2);
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.drawImage(image, 0, 0, image.naturalWidth, image.naturalHeight, padding, padding, image.naturalWidth * scale, image.naturalHeight * scale);
        const data = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const pixels = data.data;
        const width = canvas.width;
        const height = canvas.height;
        const integralWidth = width + 1;
        const luminance = new Float32Array(width * height);
        const integral = new Float64Array((width + 1) * (height + 1));
        for (let y = 0; y < height; y += 1) {
          let rowSum = 0;
          for (let x = 0; x < width; x += 1) {
            const index = (y * width + x) * 4;
            const lum = 0.299 * pixels[index] + 0.587 * pixels[index + 1] + 0.114 * pixels[index + 2];
            luminance[y * width + x] = lum;
            rowSum += lum;
            integral[(y + 1) * integralWidth + x + 1] = integral[y * integralWidth + x + 1] + rowSum;
          }
        }
        for (let i = 0; i < pixels.length; i += 4) {
          const pixel = i / 4;
          const x = pixel % width;
          const y = Math.floor(pixel / width);
          const local = average(integral, integralWidth, width, height, x, y, 24);
          const value = luminance[pixel] > local + 10 ? 0 : 255;
          pixels[i] = value;
          pixels[i + 1] = value;
          pixels[i + 2] = value;
          pixels[i + 3] = 255;
        }
        ctx.putImageData(data, 0, 0);
      }

      function average(integral, integralWidth, width, height, x, y, radius) {
        const left = Math.max(0, x - radius);
        const top = Math.max(0, y - radius);
        const right = Math.min(width - 1, x + radius);
        const bottom = Math.min(height - 1, y + radius);
        const x1 = right + 1;
        const y1 = bottom + 1;
        const sum = integral[y1 * integralWidth + x1]
          - integral[top * integralWidth + x1]
          - integral[y1 * integralWidth + left]
          + integral[top * integralWidth + left];
        return sum / ((x1 - left) * (y1 - top));
      }
    </script>
  </body>
</html>
